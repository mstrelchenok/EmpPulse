spring.application.name=EmpPulse
server.port=8080
server.address=0.0.0.0
#spring.docker.compose.enabled=false
spring.datasource.url=jdbc:postgresql://db:5432/emppulse_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
server.servlet.session.timeout=7d
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.flywaydb=DEBUG

app.owner.email=owner@emppulse.com
app.owner.password=admin