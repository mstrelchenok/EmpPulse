        premiumVacationDays:
          type: array
          items:
            $ref: '#/components/schemas/PremiumVacationDay'
        active:
          type: boolean

    EmployeeSummary:
      type: object
      required:
        - id
        - name
        - surname
        - active
      properties:
        id:
          type: integer
        name:
          type: string
        surname:
          type: string
        departmentId:
          type: integer
          nullable: true
        departmentName:
          type: string
          nullable: true
        active:
          type: boolean

    EmployeeCreate:
      type: object
