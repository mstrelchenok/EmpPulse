        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
          nullable: true

    Theme:
      type: string
      enum:
        - DARK
        - LIGHT

    Language:
      type: string
      enum:
        - ENG
        - UKR

    UserRole:
      type: string
      enum:
        - OWNER
        - ADMIN
        - WORKER

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    PasswordForgotRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

