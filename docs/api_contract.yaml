        - user
        - yearlyVacationBalance
        - active
      properties:
        id:
          type: integer
        user:
          $ref: '#/components/schemas/UserSummary'
        departmentId:
          type: integer
          nullable: true
        departmentName:
          type: string
          nullable: true
        yearlyVacationBalance:
          type: integer
