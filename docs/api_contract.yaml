          type: integer
        name:
          type: string
        surname:
          type: string
        email:
          type: string
          format: email

    UserCreate:
      type: object
      required:
        - name
        - surname
        - email
        - password
      properties:
        name:
          type: string
        surname:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        employeeDepartmentId:
          type: integer
          nullable: true
        yearlyVacationBalance:
          type: integer
          minimum: 0
        premiumVacationDays:
          type: array
          items:
            $ref: '#/components/schemas/PremiumVacationDay'
        employeeActive:
          type: boolean
        adminDepartmentIds:
          type: array
          items:
            type: integer
        adminActive:
          type: boolean
      description: >
        To create a worker, provide yearlyVacationBalance and employeeDepartmentId.
        To create an admin, provide adminDepartmentIds. A user can be both admin and employee in the same department.

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        surname:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        preferences:
          $ref: '#/components/schemas/UserPreferencesUpdate'
        employeeDepartmentId:
          type: integer
          nullable: true
        yearlyVacationBalance:
          type: integer
          minimum: 0
        premiumVacationDays:
          type: array
          items:
            $ref: '#/components/schemas/PremiumVacationDay'
        employeeActive:
          type: boolean
        adminDepartmentIds:
          type: array
          items:
            type: integer
        adminActive:
          type: boolean

    UserListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'

    MeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'

    AdminProfile:
