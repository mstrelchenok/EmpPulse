          format: password
        departmentId:
          type: integer
          nullable: true
        yearlyVacationBalance:
          type: integer
          minimum: 0
        premiumVacationDays:
          type: array
          items:
            $ref: '#/components/schemas/PremiumVacationDay'
        active:
          type: boolean

    EmployeeUpdate:
      type: object
      properties:
        departmentId:
          type: integer
          nullable: true
        yearlyVacationBalance:
          type: integer
          minimum: 0
        premiumVacationDays:
          type: array
          items:
            $ref: '#/components/schemas/PremiumVacationDay'
        active:
          type: boolean

