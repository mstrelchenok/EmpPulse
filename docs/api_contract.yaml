          type: string
        newPassword:
          type: string
          format: password
        confirmNewPassword:
          type: string
          format: password

    PasswordChangeRequest:
      type: object
      required:
        - currentPassword
        - newPassword
        - confirmNewPassword
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
        confirmNewPassword:
          type: string
          format: password

    UserPreferences:
      type: object
      required:
        - theme
        - language
      properties:
        theme:
          $ref: '#/components/schemas/Theme'
        language:
          $ref: '#/components/schemas/Language'

    UserPreferencesUpdate:
      type: object
      properties:
        theme:
          $ref: '#/components/schemas/Theme'
        language:
          $ref: '#/components/schemas/Language'

    User:
      type: object
      required:
        - id
        - name
        - surname
        - email
        - isOwner
        - preferences
      properties:
        id:
          type: integer
        name:
          type: string
        surname:
          type: string
        email:
          type: string
          format: email
        isOwner:
          type: boolean
        preferences:
          $ref: '#/components/schemas/UserPreferences'
        employeeProfile:
          $ref: '#/components/schemas/EmployeeProfile'
        adminProfile:
          $ref: '#/components/schemas/AdminProfile'

    UserSummary:
      type: object
      required:
        - id
        - name
        - surname
        - email
      properties:
