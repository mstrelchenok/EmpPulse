    DepartmentCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        adminIds:
          type: array
          items:
            type: integer
        defaultWeekHours:
          $ref: '#/components/schemas/DefaultWeekHours'

    DepartmentUpdate:
      type: object
      properties:
        name:
          type: string
        adminIds:
          type: array
          items:
            type: integer
        defaultWeekHours:
          $ref: '#/components/schemas/DefaultWeekHours'

    DepartmentListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Department'

    Employee:
      type: object
