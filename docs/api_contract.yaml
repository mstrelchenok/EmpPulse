openapi: 3.0.0
info:
  title: EmpPulse API
  version: 1.0.0
  description: REST API for EmpPulse employee leave, department, and time tracking.
servers:
   - url: http://localhost:8080
     description: Local

security:
  - CookieAuth: []

tags:
  - name: Auth
  - name: Users
  - name: Departments
  - name: Employees
  - name: Admins
  - name: LeaveRequests
  - name: LoggedHours
  - name: DefaultHours
  - name: Exports
  - name: Preferences

paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Sign in and create a session
      description: Authenticate with email and password and receive a JSESSIONID cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Sign out and invalidate the current session
      responses:
        '200':
          description: Session invalidated
          content:
            text/plain:
              schema:
                type: string
                example: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/password/forgot:
    post:
      tags:
        - Auth
      summary: Request a password reset email
      description: Sends a password reset email if the address exists.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordForgotRequest'
      responses:
        '204':
          description: Reset email queued
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/password/reset:
    post:
      tags:
        - Auth
      summary: Reset password with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '204':
          description: Password reset
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/me:
    get:
      tags:
        - Users
      summary: Get my profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/me/password:
    post:
      tags:
        - Users
      summary: Change password (logged in)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '204':
          description: Password changed and other sessions invalidated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/me/preferences:
    patch:
      tags:
        - Preferences
      summary: Update my preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferencesUpdate'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users:
    post:
      tags:
        - Users
      summary: Create a user
      description: >
        Creates a user. Admins can only create users as employees.
        Owner can additionally create users as administrators.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '204':
          description: User created
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/{userId}:
    get:
      tags:
        - Users
      summary: Get user details (to see user profile)
      description: Owner can view all users. Admins can view employees who they oversee.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Users
      summary: Update user (edit profile)
      description: Owner can update all fields. Admins can update employees department and premium vacation days.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '204':
          description: Updated user
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Users
      summary: Soft delete user (owner only)
      description: Marks user as deleted; pending leave requests are hard deleted.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admins:
    get:
      tags:
        - Admins
      summary: List admins
      description: Returns all non-deleted users who have admin profiles.
      responses:
        '200':
          description: Admins list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/departments:
    get:
      tags:
        - Departments
      responses:
        '200':
          description: Departments list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Departments
      summary: Create department (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentCreate'
      responses:
        '204':
          description: Department created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/departments/{departmentId}:
    get:
      tags:
        - Departments
      summary: Get department details
      parameters:
        - in: path
          name: departmentId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Department details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Departments
      summary: Update department
      description: Owner can rename and assign admins. Admins can update default hours.
      parameters:
        - in: path
          name: departmentId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentUpdate'
      responses:
        '204':
          description: Updated department
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Departments
      summary: Delete department (owner only)
      description: Only possible if no Employees/Administrators are assigned to given Department.
      parameters:
        - in: path
          name: departmentId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Department deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/departments/{departmentId}/default-hours:
    get:
      tags:
        - DefaultHours
      summary: Get department default week hours
      parameters:
        - in: path
          name: departmentId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Default week hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultWeekHours'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - DefaultHours
      summary: Set department default week hours
      parameters:
        - in: path
          name: departmentId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefaultWeekHours'
      responses:
        '200':
          description: Default week hours saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultWeekHours'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/employees:
    get:
      tags:
        - Employees
      summary: List employees
      description: Default sort is by surname ascending.
      parameters:
        - in: query
          name: departmentIds
          schema:
            type: array
            items:
              type: integer
      responses:
        '200':
          description: Employees list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/employees/{employeeId}/default-hours:
    get:
      tags:
        - DefaultHours
      summary: Get employee default week hours
      parameters:
        - in: path
          name: employeeId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Default week hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultWeekHours'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - DefaultHours
      summary: Set employee default week hours
      parameters:
        - in: path
          name: employeeId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefaultWeekHours'
      responses:
        '200':
          description: Default week hours saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultWeekHours'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/employees/{employeeId}/logged-hours:
    get:
      tags:
        - LoggedHours
      summary: List logged work hours
      parameters:
        - in: path
          name: employeeId
          required: true
          schema:
            type: integer
        - in: query
          name: departmentId
          schema:
            type: integer
        - in: query
          name: fromDate
          schema:
            type: string
            format: date
        - in: query
          name: toDate
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Logged hours list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedHoursListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - LoggedHours
      summary: Create logged hours (admin only)
      parameters:
        - in: path
          name: employeeId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoggedHoursCreate'
      responses:
        '201':
          description: Logged hours created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedHours'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/employees/{employeeId}/logged-hours/{loggedHoursId}:
    patch:
      tags:
        - LoggedHours
      summary: Update logged hours (admin only)
      parameters:
        - in: path
          name: employeeId
          required: true
          schema:
            type: integer
        - in: path
          name: loggedHoursId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoggedHoursUpdate'
      responses:
        '200':
          description: Logged hours updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedHours'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - LoggedHours
      summary: Delete logged hours (admin only)
      parameters:
        - in: path
          name: employeeId
          required: true
          schema:
            type: integer
        - in: path
          name: loggedHoursId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Logged hours deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/leave-requests:
    get:
      tags:
        - LeaveRequests
      summary: List leave requests
      description: >
        Returns leave requests. 
        - Owners see all requests. 
        - Admins see only requests from departments they manage. 
        - Workers see only their own requests.
      responses:
        '200':
          description: Leave requests list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequestListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - LeaveRequests
      summary: Create leave request
      description: Employees create their own requests. Admins can create on behalf of employees.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveRequestCreate'
      responses:
        '201':
          description: Leave request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/leave-requests/{leaveRequestId}:
    get:
      tags:
        - LeaveRequests
      summary: Get leave request details
      parameters:
        - in: path
          name: leaveRequestId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Leave request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - LeaveRequests
      summary: Update a leave request
      description: >
        Updates an existing leave request. 
        For employees, this can be used to edit a PENDING request. 
        For admins, this updates the request in-place.
      parameters:
        - in: path
          name: leaveRequestId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveRequestUpdate'
      responses:
        '200':
          description: Updated leave request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - LeaveRequests
      summary: Delete PENDING leave request (employee only)
      parameters:
        - in: path
          name: leaveRequestId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Leave request deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/leave-requests/{leaveRequestId}/cancel:
    post:
      tags:
        - LeaveRequests
      summary: Cancel a leave request (employee only)
      parameters:
        - in: path
          name: leaveRequestId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Leave request canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/leave-requests/{leaveRequestId}/approve:
    post:
      tags:
        - LeaveRequests
      summary: Approve a leave request
      parameters:
        - in: path
          name: leaveRequestId
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveRequestAction'
      responses:
        '200':
          description: Leave request approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/leave-requests/{leaveRequestId}/reject:
    post:
      tags:
        - LeaveRequests
      summary: Reject a leave request
      parameters:
        - in: path
          name: leaveRequestId
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveRequestAction'
      responses:
        '200':
          description: Leave request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/exports/csv:
    get:

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required:
